services:
  - type: web
    name: football-match-intelligence-api
    runtime: python
    plan: free
    healthCheckPath: /health
    buildCommand: pip install ".[dev]"
    startCommand: bash scripts/render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: football-match-intelligence-db
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: "60"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "30"

databases:
  - name: football-match-intelligence-db
    databaseName: football_api
    user: football_api_user
