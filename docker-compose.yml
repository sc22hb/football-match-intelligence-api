version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: football_api_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-football_api}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
